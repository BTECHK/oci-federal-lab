# Deploy Playbook — installs and configures FedTracker on app server
# Run: ansible-playbook -i ansible/inventory/inventory.ini ansible/playbooks/deploy_app.yml

- name: Deploy FedTracker application
  hosts: app
  become: true

  vars:
    app_dir: /opt/fedtracker
    app_user: clouduser
    app_port: 8000

  tasks:
    # --- User Setup ---
    - name: Create application user
      user:
        name: "{{ app_user }}"
        create_home: true
        shell: /bin/bash
        groups: wheel
        append: true

    # --- Dependencies ---
    - name: Install system packages
      dnf:
        name:
          - python3
          - python3-pip
          - python3-devel
          - git
        state: present

    - name: Ensure python3 is accessible
      command: python3 --version
      changed_when: false

    - name: Install Python packages
      pip:
        name:
          - fastapi
          - uvicorn
          - pydantic
          - oracledb
        executable: pip3

    # --- Application Directory ---
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    # --- Application Code ---
    - name: Copy application code
      copy:
        src: ../../app/main.py
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'
      notify: restart fedtracker

    # --- systemd Service ---
    - name: Create systemd service file
      template:
        src: ../templates/fedtracker.service.j2
        dest: /etc/systemd/system/fedtracker.service
        mode: '0644'
      notify:
        - reload systemd
        - restart fedtracker

    - name: Enable and start FedTracker
      systemd:
        name: fedtracker
        state: started
        enabled: true

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: true

    - name: restart fedtracker
      systemd:
        name: fedtracker
        state: restarted