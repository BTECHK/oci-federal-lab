# Ansible Inventory — defines which servers to manage
# Update IPs after each terraform apply
# Replace <BASTION_PUBLIC_IP>, <APP_PRIVATE_IP>, and key paths with your actual values

[bastion]
bastion_server ansible_host=<BASTION_PUBLIC_IP> ansible_user=opc ansible_ssh_private_key_file=~/.ssh/oci-federal-lab/oci-fedlab-bastion-ssh-key-YYYY-MM-DD.key

[app]
app-server ansible_host=<APP_PRIVATE_IP> ansible_user=opc ansible_ssh_private_key_file=~/.ssh/oci-federal-lab/oci-fedlab-privsubnet-appserver-private-ssh-key-YYYY-MM-DD.key

[app:vars]
# App servers are in a private subnet — connect through bastion
ansible_ssh_common_args='-o ProxyCommand="ssh -i /home/<YOUR_WSL_USERNAME>/.ssh/oci-federal-lab/oci-fedlab-bastion-ssh-key-YYYY-MM-DD.key -W %h:%p opc@<BASTION_PUBLIC_IP>"'
ansible_python_interpreter=/usr/bin/python3
